# Publishes the game to GitHub Pages on every push to main by syncing
# main into the gh-pages branch (the branch Pages serves from).
# Live site: https://agames21.github.io/Twilight-Princess-Web-remake/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main to gh-pages
        run: |
          # .nojekyll tells Pages to serve the files as-is (no Jekyll pass)
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll
          git commit -m "Publish ${GITHUB_SHA::7} to gh-pages" || true
          git push --force origin HEAD:gh-pages
